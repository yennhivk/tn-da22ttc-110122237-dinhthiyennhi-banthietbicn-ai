<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../../images/Screenshot 2025-11-10 154306.png">
    <title>Bài Viết - Yến Nhi Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .article-card {
            transition: all 0.3s ease;
        }
        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .category-badge {
            transition: all 0.2s;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation Bar -->
    <nav class="bg-gradient-to-r from-yellow-500 to-yellow-400 shadow-lg fixed top-0 left-0 right-0 z-50 w-full">
        <div class="px-3 sm:px-4 lg:px-6">
            <div class="flex items-center h-16 gap-2 sm:gap-3 lg:gap-4">
                <a href="../../index.html" class="flex items-center gap-2 cursor-pointer whitespace-nowrap group flex-shrink-0 hover:scale-105 transition-all duration-300">
                    <img src="../../images/Screenshot 2025-11-10 154306.png" alt="Yến Nhi Tech Logo" class="w-12 h-12 md:w-14 md:h-14 object-cover rounded-full shadow-lg">
                    <div class="flex items-baseline gap-1">
                        <span class="text-lg md:text-xl font-bold text-red-600 drop-shadow-md">Yến Nhi</span>
                        <span class="text-xl md:text-2xl font-bold text-blue-500 drop-shadow-lg italic" style="font-family: 'Brush Script MT', cursive;">Tech</span>
                    </div>
                </a>
                <div class="flex flex-1 max-w-xl mx-2 sm:mx-3">
                    <div class="relative w-full">
                        <input type="text" id="searchInput" placeholder="Tìm kiếm bài viết..." class="w-full pl-10 pr-3 py-2 md:py-2.5 rounded-lg border-0 text-base text-gray-700 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                        <svg class="w-6 h-6 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>
                <div class="hidden lg:flex items-center gap-6 ml-auto text-black">
                    <a href="../../index.html" class="text-lg font-bold hover:text-red-600 transition">Trang chủ</a>
                    <a href="products.html" class="text-lg font-bold hover:text-red-600 transition">Sản phẩm</a>
                    <a href="news.html" class="text-lg font-bold hover:text-red-600 transition">Tin tức</a>
                    <a href="articles.html" class="text-lg font-bold text-red-600">Bài viết</a>
                    <a href="contact.html" class="text-lg font-bold hover:text-red-600 transition">Liên hệ</a>
                </div>
                <div class="flex items-center gap-2 sm:gap-3 lg:gap-4">
                    <a href="cart.html" class="relative text-black hover:text-red-600 transition" title="Giỏ hàng">
                        <svg class="w-6 h-6 md:w-7 md:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                        <span class="cart-badge absolute -top-2 -right-2 bg-green-500 text-red-500 text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="pt-24 pb-8 bg-gradient-to-r from-indigo-600 to-purple-600">
        <div class="max-w-7xl mx-auto px-4">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-2">📝 Bài Viết</h1>
            <p class="text-indigo-100">Hướng dẫn, đánh giá và mẹo vặt công nghệ</p>
        </div>
    </section>

    <!-- Main Content -->
    <section class="py-8">
        <div class="max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-12 gap-6">
                <!-- Sidebar Filter -->
                <div class="col-span-12 lg:col-span-3">
                    <div class="bg-white rounded-xl shadow-md p-5 sticky top-24">
                        <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
                            </svg>
                            Bộ lọc
                        </h2>
                        
                        <!-- Search -->
                        <div class="mb-4">
                            <input type="text" id="articleSearchInput" placeholder="🔍 Tìm bài viết..." class="w-full px-4 py-2.5 rounded-lg border-2 border-gray-200 focus:border-indigo-500 focus:outline-none text-sm">
                        </div>

                        <!-- Category Filter -->
                        <div class="mb-4">
                            <h3 class="font-semibold text-gray-700 mb-3">Danh mục</h3>
                            <div class="space-y-2">
                                <label class="flex items-center gap-2 p-2 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="radio" name="categoryFilter" value="" class="category-radio accent-indigo-600" checked>
                                    <span class="text-sm font-medium">Tất cả</span>
                                    <span class="ml-auto text-xs text-gray-400 article-category-count" data-category="all">(0)</span>
                                </label>
                                <label class="flex items-center gap-2 p-2 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="radio" name="categoryFilter" value="huong_dan" class="category-radio accent-indigo-600">
                                    <span class="text-sm font-medium">📚 Hướng dẫn</span>
                                    <span class="ml-auto text-xs text-gray-400 article-category-count" data-category="huong_dan">(0)</span>
                                </label>
                                <label class="flex items-center gap-2 p-2 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="radio" name="categoryFilter" value="danh_gia" class="category-radio accent-indigo-600">
                                    <span class="text-sm font-medium">⭐ Đánh giá</span>
                                    <span class="ml-auto text-xs text-gray-400 article-category-count" data-category="danh_gia">(0)</span>
                                </label>
                                <label class="flex items-center gap-2 p-2 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="radio" name="categoryFilter" value="meo_vat" class="category-radio accent-indigo-600">
                                    <span class="text-sm font-medium">💡 Mẹo vặt</span>
                                    <span class="ml-auto text-xs text-gray-400 article-category-count" data-category="meo_vat">(0)</span>
                                </label>
                                <label class="flex items-center gap-2 p-2 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-50 transition">
                                    <input type="radio" name="categoryFilter" value="so_sanh" class="category-radio accent-indigo-600">
                                    <span class="text-sm font-medium">⚖️ So sánh</span>
                                    <span class="ml-auto text-xs text-gray-400 article-category-count" data-category="so_sanh">(0)</span>
                                </label>
                            </div>
                        </div>

                        <!-- Reset Button -->
                        <button onclick="resetFilters()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-lg transition">
                            🔄 Đặt lại bộ lọc
                        </button>
                    </div>
                </div>

                <!-- Articles Grid -->
                <div class="col-span-12 lg:col-span-9">
                    <!-- Search Info -->
                    <div id="searchInfo" class="mb-4 text-gray-600 text-sm"></div>

                    <!-- Articles Container -->
                    <div id="articlesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Loading -->
                        <div class="col-span-full text-center py-12">
                            <div class="animate-spin w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                            <p class="text-gray-500">Đang tải bài viết...</p>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <div id="articlesPagination" class="flex justify-center gap-2 mt-8"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-400">© 2025 Yến Nhi Tech. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/articles.js"></script>
    <script src="../js/cart.js"></script>

    <!-- Search Suggestions -->
    <script src="../js/search-suggestions.js?v=1"></script>
</body>
</html>
