<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../../images/Screenshot 2025-11-10 154306.png">
    <title>Đăng Nhập Admin - Yến Nhi Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #8B0000 0%, #DC143C 25%, #FF6347 50%, #FFD700 75%, #FFA500 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        /* Nền Tết với hoa đào và đèn lồng */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                url('https://images.unsplash.com/photo-1612198188060-c7c2a3b66eae?w=1920&q=80'),
                radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(220, 20, 60, 0.3) 0%, transparent 50%);
            background-size: cover, 600px 600px, 600px 600px;
            background-position: center, left, right;
            background-repeat: no-repeat, no-repeat, no-repeat;
            opacity: 0.4;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .admin-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 100px rgba(255, 215, 0, 0.3);
            animation: slideUp 0.5s ease-out;
            position: relative;
            z-index: 10;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .google-btn {
            transition: all 0.3s ease;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .shield-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #DC143C 0%, #FF6347 50%, #FFD700 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 2s infinite;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 50px rgba(255, 215, 0, 0.8);
            }
        }

        /* Hiệu ứng pháo hoa nhỏ */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #FFD700;
            border-radius: 50%;
            animation: sparkle 3s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes sparkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="admin-card w-full max-w-md p-10 m-4">
        <!-- Shield Icon -->
        <div class="shield-icon">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
            </svg>
        </div>

        <!-- Title -->
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">Quản Trị Viên</h1>
        <p class="text-center text-gray-600 mb-8">Đăng nhập bằng tài khoản Google để truy cập trang quản trị</p>

        <!-- Alert Message -->
        <div id="alert-message" class="hidden mb-6 p-4 rounded-lg"></div>

        <!-- Thông báo chính thức -->
        <div class="mb-6 p-4 bg-blue-50 rounded-xl border-2 border-blue-200">
            <p class="text-center text-blue-800 font-semibold text-base">
                🔐 Admin chỉ đăng nhập bằng tài khoản Google được cấp quyền
            </p>
        </div>

        <!-- Google Login -->
        <button 
            onclick="loginWithGoogle()" 
            class="google-btn w-full bg-white border-2 border-gray-300 text-gray-700 font-semibold py-4 px-6 rounded-xl hover:bg-gray-50 transition duration-300 shadow-md"
        >
            <span class="flex items-center justify-center gap-3">
                <svg class="w-6 h-6" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Đăng nhập với Google
            </span>
        </button>

        <!-- Security Note -->
        <div class="mt-8 p-4 bg-purple-50 rounded-lg border border-purple-200">
            <p class="text-sm text-center text-purple-700">
                <svg class="w-4 h-4 inline mr-1" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                </svg>
                Chỉ dành cho quản trị viên có quyền truy cập
            </p>
        </div>

        <!-- Back to Home -->
        <div class="mt-6 flex flex-col gap-3 text-center">
            <a href="employee-login.html" class="text-purple-600 hover:text-purple-700 font-semibold text-sm transition">
                🔑 Đăng nhập bằng Email & Mật khẩu
            </a>
            <a href="../index.html" class="text-gray-500 hover:text-gray-700 font-medium text-sm transition">
                ← Về trang chủ
            </a>
        </div>
    </div>

    <script src="../js/admin-login.js"></script>
</body>
</html>
